services:
  # Backend API Service using Docker
  - type: web
    name: vehicle-telemetry-api
    runtime: docker
    repo: https://github.com/Ajaykumarnachimuthu/AI-Based-Vehicle-Telemetry-Alert-Fault-Detection-System
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /

  # Frontend Static Site
  - type: web
    name: vehicle-telemetry-dashboard
    runtime: static
    repo: https://github.com/Ajaykumarnachimuthu/AI-Based-Vehicle-Telemetry-Alert-Fault-Detection-System
    branch: main
    buildCommand: echo "Static site - no build required"
    staticPublishPath: ./frontend