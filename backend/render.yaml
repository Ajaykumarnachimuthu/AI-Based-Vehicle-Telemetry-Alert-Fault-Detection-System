services:
services:
  # Backend API Service
  - type: web
    name: vehicle-telemetry-api
    runtime: python
    repo: https://github.com/Ajaykumarnachimuthu/AI-Based-Vehicle-Telemetry-Alert-Fault-Detection-System
    branch: main
    buildCommand: |
      cd backend
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend
      uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Static Site
  - type: web
    name: vehicle-telemetry-dashboard
    runtime: static
    repo: https://github.com/Ajaykumarnachimuthu/AI-Based-Vehicle-Telemetry-Alert-Fault-Detection-System
    branch: main
    buildCommand: echo "Static site - no build required"
    staticPublishPath: ./frontend