services:

  # Backend API (already deployed)
  - type: web
    name: vehicle-telemetry-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: API_URL
        value: https://vehicle-telemetry-api.onrender.com

  # NEW: Simulator as background worker
  - type: worker
    name: vehicle-telemetry-simulator
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.simulator
    dockerContext: ./backend
    envVars:
      - key: API_URL
        value: https://vehicle-telemetry-api.onrender.com

  # Frontend Static Site (unchanged)
  - type: web
    name: vehicle-telemetry-dashboard
    runtime: static
    repo: https://github.com/Ajaykumarnachimuthu/AI-Based-Vehicle-Telemetry-Alert-Fault-Detection-System
    branch: main
    buildCommand: echo "Static site - no build required"
    staticPublishPath: ./frontend