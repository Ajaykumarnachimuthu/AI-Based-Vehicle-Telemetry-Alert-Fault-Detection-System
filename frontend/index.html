<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Vehicle Telemetry System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-car-side"></i>
                <h1>Fleet<span>Watch</span></h1>
            </div>
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Vehicle Panel -->
            <div class="card vehicle-card">
                <div class="card-header">
                    <h2><i class="fas fa-tachometer-alt"></i> Vehicle Telemetry</h2>
                    <div class="vehicle-selector-wrapper">
                        <select id="vehicleSelect" class="vehicle-select">
                            <option value="V101">🚗 Tesla Model 3 (V101)</option>
                            <option value="V102">🚙 Ford F-150 (V102)</option>
                            <option value="V103">🚐 Toyota Camry (V103)</option>
                            <option value="V104">🏎️ BMW X5 (V104)</option>
                            <option value="V105">🚛 Mercedes Sprinter (V105)</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>

                <!-- Vehicle Animation -->
                <div class="animation-container">
                    <div class="road">
                        <div class="car-model" id="carModel">
                            <div class="car-top"></div>
                            <div class="car-body">
                                <div class="window"></div>
                                <div class="door-line"></div>
                            </div>
                            <div class="wheel front"></div>
                            <div class="wheel rear"></div>
                        </div>
                        <div class="road-lines" id="roadLines"></div>
                    </div>

                    <!-- Status LED -->
                    <div class="status-led-container">
                        <div class="led-wrapper">
                            <div class="led led-green" id="ledGreen"></div>
                            <span>Normal</span>
                        </div>
                        <div class="led-wrapper">
                            <div class="led led-yellow" id="ledYellow"></div>
                            <span>Warning</span>
                        </div>
                        <div class="led-wrapper">
                            <div class="led led-red" id="ledRed"></div>
                            <span>Critical</span>
                        </div>
                    </div>
                </div>

                <!-- Live Gauges -->
                <div class="gauges-grid">
                    <div class="gauge">
                        <div class="gauge-header">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Speed</span>
                        </div>
                        <div class="gauge-value" id="gaugeSpeed">0</div>
                        <div class="gauge-unit">km/h</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressSpeed" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="gauge">
                        <div class="gauge-header">
                            <i class="fas fa-temperature-high"></i>
                            <span>Engine Temp</span>
                        </div>
                        <div class="gauge-value" id="gaugeTemp">0</div>
                        <div class="gauge-unit">°C</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressTemp" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="gauge">
                        <div class="gauge-header">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>RPM</span>
                        </div>
                        <div class="gauge-value" id="gaugeRPM">0</div>
                        <div class="gauge-unit">x1000</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressRPM" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="gauge">
                        <div class="gauge-header">
                            <i class="fas fa-car-battery"></i>
                            <span>Battery</span>
                        </div>
                        <div class="gauge-value" id="gaugeBattery">0</div>
                        <div class="gauge-unit">V</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressBattery" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="gauge">
                        <div class="gauge-header">
                            <i class="fas fa-gas-pump"></i>
                            <span>Fuel</span>
                        </div>
                        <div class="gauge-value" id="gaugeFuel">0</div>
                        <div class="gauge-unit">%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFuel" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="card controls-card">
                <div class="card-header">
                    <h2><i class="fas fa-sliders-h"></i> Control Panel</h2>
                    <div class="sound-toggle">
                        <i class="fas fa-volume-up"></i>
                        <label class="switch">
                            <input type="checkbox" id="soundToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <!-- Quick Fault Buttons -->
                <div class="quick-faults">
                    <button class="fault-btn overheat" onclick="triggerFault('overheat')">
                        <i class="fas fa-fire"></i>
                        <span>Overheat</span>
                    </button>
                    <button class="fault-btn overspeed" onclick="triggerFault('overspeed')">
                        <i class="fas fa-gauge-high"></i>
                        <span>Overspeed</span>
                    </button>
                    <button class="fault-btn battery" onclick="triggerFault('battery')">
                        <i class="fas fa-bolt"></i>
                        <span>Battery</span>
                    </button>
                    <button class="fault-btn rpm" onclick="triggerFault('rpm')">
                        <i class="fas fa-cogs"></i>
                        <span>High RPM</span>
                    </button>
                    <button class="fault-btn fuel" onclick="triggerFault('fuel')">
                        <i class="fas fa-gas-pump"></i>
                        <span>Low Fuel</span>
                    </button>
                </div>

                <!-- Manual Controls -->
                <div class="manual-controls">
                    <h3>Manual Adjustment</h3>

                    <div class="control-row">
                        <div class="control-label">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Speed</span>
                        </div>
                        <div class="control-input">
                            <input type="range" id="speedSlider" class="smooth-slider" min="0" max="200" value="65"
                                step="1">
                            <span class="slider-value" id="speedValue">65 km/h</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-label">
                            <i class="fas fa-temperature-high"></i>
                            <span>Engine Temp</span>
                        </div>
                        <div class="control-input">
                            <input type="range" id="tempSlider" class="smooth-slider" min="0" max="150" value="85"
                                step="0.5">
                            <span class="slider-value" id="tempValue">85 °C</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-label">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>RPM</span>
                        </div>
                        <div class="control-input">
                            <input type="range" id="rpmSlider" class="smooth-slider" min="0" max="8000" value="2500"
                                step="50">
                            <span class="slider-value" id="rpmValue">2500</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-label">
                            <i class="fas fa-car-battery"></i>
                            <span>Battery</span>
                        </div>
                        <div class="control-input">
                            <input type="range" id="batterySlider" class="smooth-slider" min="8" max="15" value="12.6"
                                step="0.1">
                            <span class="slider-value" id="batteryValue">12.6 V</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-label">
                            <i class="fas fa-gas-pump"></i>
                            <span>Fuel</span>
                        </div>
                        <div class="control-input">
                            <input type="range" id="fuelSlider" class="smooth-slider" min="0" max="100" value="75"
                                step="1">
                            <span class="slider-value" id="fuelValue">75 %</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn primary" onclick="sendTelemetry()">
                        <i class="fas fa-paper-plane"></i>
                        Send Data
                    </button>
                    <button class="btn secondary" onclick="resetToNormal()">
                        <i class="fas fa-undo-alt"></i>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Alerts Panel -->
            <div class="card alerts-card">
                <div class="card-header">
                    <h2><i class="fas fa-exclamation-triangle"></i> Alert History</h2>
                    <button class="btn-icon" onclick="clearAlerts()">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>

                <div class="alert-filters">
                    <button class="filter-btn active" data-filter="all" onclick="filterAlerts('all')">All</button>
                    <button class="filter-btn" data-filter="High" onclick="filterAlerts('High')">High</button>
                    <button class="filter-btn" data-filter="Medium" onclick="filterAlerts('Medium')">Medium</button>
                    <button class="filter-btn" data-filter="Low" onclick="filterAlerts('Low')">Low</button>
                </div>

                <div class="alert-list" id="alertList">
                    <div class="alert-placeholder">
                        <i class="fas fa-bell"></i>
                        <p>No alerts yet</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alert Banner -->
        <div class="alert-banner" id="alertBanner">
            <div class="banner-content">
                <i class="fas fa-exclamation-circle"></i>
                <span id="bannerMessage">Critical fault detected</span>
            </div>
            <button class="banner-close" onclick="dismissBanner()">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
